          <SectionLabel>Status de pagamento</SectionLabel>
          {[{label:'Pago',value:pPaid,color:T.green},{label:'Pendente',value:pPending,color:T.amber}].map((item,i)=>(
            <div key={i} style={{ marginBottom:i===0?12:0 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                <span style={{ fontSize:12, color:T.muted, fontWeight:500 }}>{item.label}</span>
                <span style={{ fontSize:13, fontWeight:700, color:item.color, fontVariantNumeric:'tabular-nums' }}>{fmt(item.value)}</span>
              </div>
              <ProgressBar value={item.value} max={pTotal||1} color={item.color} height={5}/>
            </div>
          ))}
        </SCard>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:28 }}>
          {[
            {label:'Total do mês',    value:pTotal,    color:T.navy  },
            {label:'Maior categoria', value:breakdown[0]?.amount||0, color:T.red, sub:breakdown[0]?.name||'—'},
            {label:'Cartões',         value:pCardTotal, color:T.blue  },
            {label:'Fixo mensal',     value:pBillTotal+pRecTotal, color:'#7C3AED'},
          ].map(tile=>(
            <SCard key={tile.label} style={{ padding:14 }}>
              <div style={{ fontSize:10, color:T.muted, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:5 }}>{tile.label}</div>
              <div style={{ fontSize:18, fontWeight:700, color:tile.color, fontVariantNumeric:'tabular-nums' }}>{fmt(tile.value)}</div>
              {tile.sub && <div style={{ fontSize:11, color:T.faint, marginTop:3 }}>{tile.sub}</div>}
            </SCard>
          ))}
        </div>
      </>}

      {tab==='categories' && (
        <SCard style={{ padding:18, marginBottom:28 }}>
          <SectionLabel>Por categoria · {MONTH_NAMES_PT[vm]}</SectionLabel>
          {breakdown.map(cat=>(
            <div key={cat.name} style={{ marginBottom:16 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                  <div style={{ width:7,height:7,borderRadius:'50%',background:cat.color }}/>
                  <span style={{ fontSize:13, fontWeight:500, color:T.navy }}>{cat.name}</span>
                </div>
                <div style={{ textAlign:'right' }}>
                  <span style={{ fontSize:14, fontWeight:700, color:T.navy, fontVariantNumeric:'tabular-nums' }}>{fmt(cat.amount)}</span>
                  <span style={{ fontSize:10, color:T.faint, marginLeft:6 }}>{pTotal?Math.round((cat.amount/pTotal)*100):0}%</span>
                </div>
              </div>
              <ProgressBar value={cat.amount} max={maxCat} color={cat.color} height={4}/>
            </div>
          ))}
        </SCard>
      )}

      {tab==='calendar' && (
        <SCard style={{ padding:18, marginBottom:28 }}>
          <SectionLabel>Vencimentos · {MONTH_NAMES_PT[vm]}</SectionLabel>
          <div style={{ marginTop:8 }}><CalView/></div>
        </SCard>
      )}
    </div>
  );
};

Object.assign(window,{ ReportsScreen });
</script>

<!-- ─────────────────────────────────────────────
     7. APP SHELL
───────────────────────────────────────────── -->
<script type="text/babel">
const NAV_TABS = [
  { id:'dashboard', label:'Início',    icon:'dashboard' },
  { id:'cards',     label:'Cartões',   icon:'card'      },
  { id:'fixed',     label:'Contas',    icon:'calendar'  },
  { id:'reports',   label:'Relatórios',icon:'chart'     },
];

const BottomNav = ({ active, onChange }) => (
  <nav style={{ display:'flex', background:'#FFFFFF', borderTop:`1px solid ${T.border}`, paddingBottom:'env(safe-area-inset-bottom,4px)', flexShrink:0 }}>
    {NAV_TABS.map(tab=>{
      const on=active===tab.id;
      return (
        <button key={tab.id} onClick={()=>onChange(tab.id)} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', paddingTop:10, paddingBottom:6, gap:3, background:'none', border:'none', cursor:'pointer' }}>
          <div style={{ width:38,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',background:on?'#EEF2FF':'transparent',transition:'background 150ms' }}>
            <Icon name={tab.icon} size={19} color={on?'#4F46E5':'#94A3B8'} strokeWidth={on?2.1:1.6}/>
          </div>
          <span style={{ fontSize:10, fontWeight:on?600:400, color:on?'#4F46E5':'#94A3B8', letterSpacing:'0.01em' }}>{tab.label}</span>
        </button>
      );
    })}
  </nav>
);

const ToastBar = () => {
  const { toast, dismissToast } = useFinance();
  if (!toast) return null;
  return (
    <div style={{ position:'absolute', bottom:76, left:12, right:12, zIndex:300, background:T.navy, borderRadius:12, padding:'12px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', boxShadow:'0 4px 20px rgba(0,0,0,0.3)', animation:'slideUpFast 200ms ease' }}>
      <span style={{ fontSize:13, color:'#fff' }}>{toast.message}</span>
      <div style={{ display:'flex', gap:10, alignItems:'center' }}>
        {toast.undoFn && (
          <button onClick={()=>{ toast.undoFn(); dismissToast(); }} style={{ fontSize:12, fontWeight:700, color:'#A5B4FC', background:'none', border:'none', cursor:'pointer', letterSpacing:'0.04em' }}>DESFAZER</button>
        )}
        <button onClick={dismissToast} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', alignItems:'center' }}>
          <Icon name="x" size={14} color="rgba(255,255,255,0.5)" strokeWidth={2}/>
        </button>
      </div>
    </div>
  );
};

const SCREENS = { dashboard:DashboardScreen, cards:CreditCardsScreen, fixed:FixedExpensesScreen, reports:ReportsScreen };

const AppShell = () => {
  const [screen, setScreen] = React.useState('dashboard');
  const navigate = id => { if(id!==screen) setScreen(id); };
  const Screen = SCREENS[screen];
  return (
    <div style={{ display:'flex', flexDirection:'column', width:'100%', maxWidth:430, height:'100%', background:'#F8FAFC', overflow:'hidden', boxShadow:'0 0 60px rgba(15,23,42,0.18)', position:'relative' }}>
      <div key={screen} className="screen-fade" style={{ flex:1, overflowY:'auto', overflowX:'hidden', minHeight:0 }}>
        <Screen onNavigate={navigate}/>
      </div>
      <ToastBar/>
      <BottomNav active={screen} onChange={navigate}/>
    </div>
  );
};

const App = () => (
  <FinanceProvider>
    <div style={{ height:'100dvh', display:'flex', alignItems:'center', justifyContent:'center', background:'#CBD5E1' }}>
      <AppShell/>
    </div>
  </FinanceProvider>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
